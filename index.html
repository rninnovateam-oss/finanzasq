<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>FinanzasQ2</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#040d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanzasQ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Control financiero personal — salario quincenal, deudas y presupuesto">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══ RESET & ROOT ═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040d1a; --surf:#081428; --card:#0b1c33; --card2:#0f2340;
  --b1:rgba(70,140,230,.07); --b2:rgba(70,140,230,.13); --b3:rgba(70,140,230,.2);
  --teal:#05d4a8; --teal-d:rgba(5,212,168,.12); --teal-b:rgba(5,212,168,.25);
  --red:#ff4d6d; --red-d:rgba(255,77,109,.1); --red-b:rgba(255,77,109,.25);
  --amber:#ffb020; --amber-d:rgba(255,176,32,.1); --amber-b:rgba(255,176,32,.25);
  --blue:#4a9cf4; --blue-d:rgba(74,156,244,.1);
  --purple:#9b87ff; --purple-d:rgba(155,135,255,.1);
  --t0:#c4dcf8; --t1:#6080a0; --t2:#334d6a;
  --r:10px; --r-lg:16px; --r-xl:22px;
  --font:'Outfit',sans-serif; --mono:'DM Mono',monospace;
  --nav-h:62px; --topbar-h:52px; --pmode-h:38px;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--t0);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px}
input,select,textarea,button{font-family:var(--font);-webkit-appearance:none;appearance:none;outline:none}
button{cursor:pointer;border:none;background:transparent;color:inherit}

/* ═══ WELCOME SCREEN ════════════════════════════════════════════════════ */
.welcome-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
  padding:24px;overflow-y:auto;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(5,212,168,.06) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(74,156,244,.05) 0%,transparent 55%);
}
.welcome-inner{width:100%;max-width:380px;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.w-badge{display:inline-flex;align-items:center;gap:8px;background:var(--teal-d);border:1px solid var(--teal-b);
  color:var(--teal);border-radius:40px;padding:6px 14px;font-size:.75rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.w-title{font-size:2.6rem;font-weight:800;color:var(--t0);line-height:1;letter-spacing:-.03em;margin-bottom:8px}
.w-title span{color:var(--teal)}
.w-sub{font-size:.9rem;color:var(--t1);margin-bottom:36px;line-height:1.5}
.w-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r-xl);padding:28px}
.w-card-title{font-size:.7rem;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:20px}

/* ═══ FORM ELEMENTS ══════════════════════════════════════════════════════ */
.lbl{display:block;font-size:.72rem;font-weight:600;color:var(--t2);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:7px}
.field{background:var(--card2);border:1.5px solid var(--b2);color:var(--t0);border-radius:var(--r);
  padding:11px 14px;font-size:.9rem;width:100%;transition:border-color .15s,box-shadow .15s}
.field:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(5,212,168,.1)}
.field::placeholder{color:var(--t2)}
select.field option{background:var(--card2);color:var(--t0)}
textarea.field{resize:vertical;min-height:72px;line-height:1.5}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field-prefix{position:relative}
.field-prefix .field{padding-left:28px}
.field-prefix::before{content:'$';position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--t1);font-size:.9rem;font-family:var(--mono);pointer-events:none;z-index:1}

/* ═══ BUTTONS ════════════════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;
  border-radius:var(--r);font-size:.875rem;font-weight:600;transition:all .15s;white-space:nowrap;border:none}
.btn-primary{background:var(--teal);color:#040d1a;font-weight:700}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:active{filter:brightness(.95)}
.btn-ghost{background:transparent;border:1.5px solid var(--b2);color:var(--t1)}
.btn-ghost:hover{border-color:var(--b3);color:var(--t0)}
.btn-danger{background:var(--red-d);border:1px solid var(--red-b);color:var(--red)}
.btn-danger:hover{background:rgba(255,77,109,.18)}
.btn-sm{padding:7px 14px;font-size:.8rem}
.btn-xs{padding:5px 10px;font-size:.75rem}
.btn-full{width:100%;justify-content:center}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
  border-radius:8px;border:1px solid var(--b1);color:var(--t1);background:transparent;
  transition:all .15s;font-size:.9rem}
.btn-icon:hover{border-color:var(--b2);color:var(--t0);background:var(--b1)}
.btn-pay{background:var(--teal-d);border:1px solid var(--teal-b);color:var(--teal);
  border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:600;white-space:nowrap;transition:all .15s}
.btn-pay:hover{background:rgba(5,212,168,.2)}
.btn-unpay{background:transparent;border:1px solid var(--b1);color:var(--t2);
  border-radius:8px;padding:5px 10px;font-size:.75rem;transition:all .15s}
.btn-unpay:hover{border-color:var(--red-b);color:var(--red)}

/* ═══ APP SHELL ══════════════════════════════════════════════════════════ */
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.topbar{
  height:var(--topbar-h);background:var(--surf);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;position:relative;z-index:50;
}
.tb-logo{font-size:1.1rem;font-weight:800;color:var(--teal);letter-spacing:-.02em;white-space:nowrap}
.tb-logo span{font-size:.6rem;font-weight:400;color:var(--t2);margin-left:5px;
  letter-spacing:.1em;text-transform:uppercase;vertical-align:middle}
.tb-period{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.period-nav{color:var(--t1);font-size:1.1rem;padding:4px 8px;border-radius:6px;
  transition:all .12s;line-height:1}
.period-nav:hover{background:var(--b1);color:var(--t0)}
#period-label{font-size:.85rem;font-weight:600;color:var(--t0);min-width:120px;text-align:center;letter-spacing:.01em}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.saldo-badge{display:flex;align-items:center;gap:6px;background:var(--card);
  border:1px solid var(--b2);border-radius:40px;padding:5px 12px;cursor:pointer;transition:all .15s}
.saldo-badge:hover{border-color:var(--teal-b);background:var(--teal-d)}
.saldo-badge-lbl{font-size:.65rem;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
#header-saldo{font-size:.88rem;font-weight:700;color:var(--teal);font-family:var(--mono)}
.icon-btn{color:var(--t1);font-size:1rem;padding:6px;border-radius:8px;transition:all .12s;line-height:1}
.icon-btn:hover{background:var(--b1);color:var(--t0)}

/* ── Period mode selector ── */
.period-mode{
  display:flex;align-items:center;justify-content:center;gap:0;
  height:var(--pmode-h);background:var(--surf);border-bottom:1px solid var(--b1);
  flex-shrink:0;padding:6px 16px;gap:4px;
}
.pm-btn{flex:1;max-width:90px;padding:5px;font-size:.78rem;font-weight:600;border-radius:8px;
  color:var(--t2);background:transparent;transition:all .15s;letter-spacing:.02em}
.pm-btn.active{background:var(--teal-d);color:var(--teal);border:1px solid var(--teal-b)}
.pm-btn:hover:not(.active){color:var(--t1);background:var(--b1)}

/* ── Tab content ── */
.tab-content{flex:1;overflow:hidden;position:relative}
.tab-panel{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--nav-h) + 16px + env(safe-area-inset-bottom,0px))}

/* ═══ CARDS ═══════════════════════════════════════════════════════════════ */
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r-lg)}
.card-p{padding:18px}
.card + .card{margin-top:12px}

/* Hero balance card */
.balance-hero{
  background:linear-gradient(135deg,var(--card) 0%,#0d2540 100%);
  border:1px solid var(--b2);border-radius:var(--r-xl);padding:22px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.balance-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(5,212,168,.1) 0%,transparent 70%);
  pointer-events:none;
}
.hero-lbl{font-size:.68rem;font-weight:600;color:var(--t1);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hero-lbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.hero-amount{font-family:var(--mono);font-size:2.4rem;font-weight:500;color:var(--teal);
  letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.hero-after{font-size:.8rem;color:var(--t1);display:flex;align-items:center;gap:6px}
.hero-after span{color:var(--teal);font-family:var(--mono);font-weight:500}
.hero-after.neg span{color:var(--red)}
.hero-edit{position:absolute;top:18px;right:18px;color:var(--t2);font-size:.85rem;padding:4px 8px;
  border-radius:6px;border:1px solid var(--b1);transition:all .15s}
.hero-edit:hover{color:var(--teal);border-color:var(--teal-b)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r-lg);
  padding:14px 16px;border-top:2px solid var(--c,transparent)}
.stat-lbl{font-size:.65rem;font-weight:600;color:var(--t2);text-transform:uppercase;
  letter-spacing:.09em;margin-bottom:6px}
.stat-val{font-family:var(--mono);font-size:1.15rem;font-weight:500;color:var(--c,var(--t0));
  letter-spacing:-.02em}
.stat-sub{font-size:.7rem;color:var(--t2);margin-top:3px}

/* Section headers */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--b1)}
.section-title{font-size:.8rem;font-weight:700;color:var(--t1);text-transform:uppercase;
  letter-spacing:.08em;display:flex;align-items:center;gap:7px}
.section-title .dot{width:6px;height:6px;border-radius:50%;background:var(--c,var(--t1));flex-shrink:0}
.section-count{font-size:.72rem;color:var(--t2);background:var(--b1);padding:2px 8px;border-radius:20px}

/* ═══ DEBT ITEMS ══════════════════════════════════════════════════════════ */
.di{background:var(--card);border:1px solid var(--b1);border-left:3px solid var(--c,var(--b2));
  border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.di.paid{opacity:.62;--c:var(--teal)}
.di.pending{--c:var(--red)}
.di.loan{--c:var(--amber)}
.di.annual{--c:var(--purple)}
.di-main{display:flex;align-items:center;gap:10px;padding:13px 14px 10px}
.di-icon{width:34px;height:34px;border-radius:9px;background:rgba(var(--ci,70,140,230),.1);
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.di-body{flex:1;min-width:0}
.di-name{font-size:.9rem;font-weight:600;color:var(--t0);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;display:block}
.di-name.crossed{text-decoration:line-through;color:var(--t2)}
.di-meta{font-size:.72rem;color:var(--t2);display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:3px}
.di-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.di-amt{font-family:var(--mono);font-size:1rem;font-weight:500;white-space:nowrap}
.di-foot{display:flex;align-items:center;justify-content:flex-end;gap:6px;
  padding:8px 12px;border-top:1px solid var(--b1)}
.di-prog{padding:0 14px 12px}
.prog{height:4px;background:var(--b2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .5s ease}
.prog-meta{display:flex;justify-content:space-between;font-size:.67rem;color:var(--t2);
  margin-top:4px;font-family:var(--mono)}

/* ═══ INCOME ITEMS ════════════════════════════════════════════════════════ */
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.tx-item:last-child{border-bottom:none}
.tx-item:hover{background:var(--b1)}
.tx-item:active{background:var(--b1)}
.tx-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:.9rem;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:.88rem;font-weight:500;color:var(--t0);display:block;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:.72rem;color:var(--t2);display:block;margin-top:2px}
.tx-amt{font-family:var(--mono);font-size:.95rem;font-weight:500;white-space:nowrap;flex-shrink:0}
.tx-del{color:var(--t2);font-size:.85rem;padding:4px 7px;border-radius:6px;
  transition:all .15s;opacity:0}
.tx-item:hover .tx-del{opacity:1}
.tx-del:hover{color:var(--red)}

/* ═══ PILL / BADGE ════════════════════════════════════════════════════════ */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-size:.68rem;font-weight:600;letter-spacing:.03em}
.pill-teal{background:var(--teal-d);color:var(--teal);border:1px solid var(--teal-b)}
.pill-red{background:var(--red-d);color:var(--red);border:1px solid var(--red-b)}
.pill-amber{background:var(--amber-d);color:var(--amber);border:1px solid var(--amber-b)}
.pill-blue{background:var(--blue-d);color:var(--blue)}
.pill-purple{background:var(--purple-d);color:var(--purple)}
.pill-gray{background:var(--b1);color:var(--t2)}

/* ═══ AI SECTION ══════════════════════════════════════════════════════════ */
.ai-insight{background:linear-gradient(135deg,rgba(155,135,255,.08),rgba(5,212,168,.06));
  border:1px solid rgba(155,135,255,.2);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.ai-insight-hd{font-size:.7rem;font-weight:600;color:var(--purple);text-transform:uppercase;
  letter-spacing:.09em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ai-insight-txt{font-size:.85rem;color:var(--t0);line-height:1.6}

.ai-chat-area{display:flex;flex-direction:column;gap:10px;min-height:0}
.ai-bubble{border-radius:var(--r-lg);padding:13px 15px;font-size:.875rem;line-height:1.65;
  max-width:90%;word-break:break-word}
.ai-bubble.user{background:rgba(5,212,168,.08);border:1px solid rgba(5,212,168,.15);
  color:var(--t0);align-self:flex-end;border-radius:var(--r-lg) var(--r-lg) 4px var(--r-lg)}
.ai-bubble.bot{background:var(--card2);border:1px solid var(--b1);
  color:var(--t0);align-self:flex-start;border-radius:var(--r-lg) var(--r-lg) var(--r-lg) 4px}
.ai-bubble h4{font-size:.8rem;color:var(--purple);margin-bottom:6px;font-weight:600}
.ai-bubble strong{color:var(--teal);font-weight:600}
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:7px;height:7px;background:var(--t2);border-radius:50%;
  animation:tdot .8s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.ai-quick-prompts{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.qp{background:var(--card2);border:1px solid var(--b2);color:var(--t1);border-radius:40px;
  padding:6px 13px;font-size:.77rem;transition:all .15s;white-space:nowrap;font-family:var(--font)}
.qp:hover{border-color:var(--purple-d);background:var(--purple-d);color:var(--t0)}

.ai-input-row{display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.ai-input-row .field{flex:1}

/* ═══ MODALS ══════════════════════════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--card);border:1px solid var(--b2);width:100%;max-width:520px;
  max-height:90vh;overflow-y:auto;border-radius:22px 22px 0 0;
  animation:slideUp .25s cubic-bezier(.25,.8,.25,1);padding:24px 20px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom,0px))}
@keyframes slideUp{from{opacity:.4;transform:translateY(60px)}to{opacity:1;transform:none}}
@media(min-width:600px){
  .overlay{align-items:center;padding:20px}
  .modal{border-radius:var(--r-xl);max-height:85vh;width:calc(100% - 40px);animation:popIn .22s ease}
  @keyframes popIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
}
.modal-handle{width:36px;height:4px;background:var(--b3);border-radius:2px;
  margin:0 auto 20px;display:block}
.modal-title{font-size:1.05rem;font-weight:700;color:var(--t0);margin-bottom:20px;
  display:flex;align-items:center;gap:10px}
.modal-title .m-icon{font-size:1.2rem}
.modal-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-footer .btn{flex:1;justify-content:center}

/* Type selector */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.type-card{border:1.5px solid var(--b2);border-radius:var(--r-lg);padding:14px 8px;
  cursor:pointer;text-align:center;background:transparent;transition:all .15s;font-family:var(--font)}
.type-card.on{background:rgba(var(--tc-rgb,5,212,168),.08);border-color:rgba(var(--tc-rgb,5,212,168),.4);
  border-width:2px}
.type-card-icon{font-size:1.4rem;margin-bottom:6px;display:block}
.type-card-lbl{font-size:.78rem;font-weight:600;color:var(--t0);display:block}
.type-card-desc{font-size:.64rem;color:var(--t2);display:block;margin-top:2px;line-height:1.3}

/* Loan calc box */
.loan-calc{background:var(--card2);border-radius:var(--r-lg);padding:14px;margin:10px 0}
.loan-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}
.ls-lbl{font-size:.63rem;color:var(--t2);font-weight:500;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:4px}
.ls-val{font-family:var(--mono);font-size:.95rem;font-weight:500;color:var(--amber)}

/* Quick add */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.qa-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:20px 14px;border-radius:var(--r-lg);border:1.5px solid var(--b2);
  background:var(--card2);transition:all .18s;font-family:var(--font)}
.qa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.qa-btn-icon{font-size:1.6rem;line-height:1}
.qa-btn-lbl{font-size:.85rem;font-weight:600;color:var(--t0)}
.qa-btn-sub{font-size:.72rem;color:var(--t2)}

/* Seg control */

<!-- ══════ JAVASCRIPT ═══════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════════
const LS = 'fq_v4';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const NOW = new Date();
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

const CATS_INGRESO = ['Salario','Extra','Freelance','Negocio','Inversión','Otro'];
const CATS_GASTO = ['Alimentación','Transporte','Salud','Hogar','Entretenimiento','Ropa','Servicios','Otro'];
const CATS_DEUDA = ['Servicio','Suscripción','Seguro','Alquiler','Impuesto','Préstamo bancario','Otro'];

const QUINCENA_ICONS = { 1: '🌅', 2: '🌆' };
const TIPO_ICONS = {
  salario: '💵', extra: '💸', freelance: '💻', negocio: '🏢',
  alimentacion: '🛒', transporte: '🚗', salud: '❤️', hogar: '🏠',
  entretenimiento: '🎬', ropa: '👕', servicios: '⚡', prestamo: '🏦',
  mensual: '🔄', anual: '📅', otro: '📌'
};

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let S = {
  name: '',
  screen: 'welcome',
  tab: 'inicio',
  saldo: 0,
  period: { mes: NOW.getMonth() + 1, año: NOW.getFullYear(), q: 0 },
  entries: [],
  aiMessages: [],
  aiLoading: false,
  claudeKey: '',
  groqKey: '',
  aiProvider: 'claude', // 'claude' | 'groq'
  aiInsight: '',
  deudasFilter: 'todas',
};

// ═══════════════════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════════
function persist() {
  try { localStorage.setItem(LS, JSON.stringify(S)); } catch(e) {}
}
function loadData() {
  try {
    const d = localStorage.getItem(LS);
    if (d) {
      const parsed = JSON.parse(d);
      Object.assign(S, parsed);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const R2 = n => Math.round((n||0)*100)/100;

function fmt(n) {
  const a = Math.abs(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return (n < 0 ? '-' : '') + '$' + a;
}
function fmtShort(n) {
  const a = Math.abs(n||0);
  if (a >= 1000000) return (n<0?'-':'') + '$' + (a/1000000).toFixed(1) + 'M';
  if (a >= 1000) return (n<0?'-':'') + '$' + (a/1000).toFixed(1) + 'k';
  return fmt(n);
}
const isoToday = () => new Date().toISOString().slice(0, 10);
const monthKey = (m, y) => `${y}-${String(m).padStart(2,'0')}`;
const mDiff = (m1,y1,m2,y2) => (y2-y1)*12 + (m2-m1);

function periodLabel(p) {
  const m = MONTHS[p.mes - 1];
  if (p.q === 1) return `1ª Quincena · ${m} ${p.año}`;
  if (p.q === 2) return `2ª Quincena · ${m} ${p.año}`;
  return `${m} ${p.año}`;
}

function calcCuota(cap, tasa, plazo) {
  const r = tasa / 100;
  if (r === 0) return R2(cap / plazo);
  return R2(cap * (r * Math.pow(1+r, plazo)) / (Math.pow(1+r, plazo) - 1));
}

function loanRemainingBalance(loan, upToMes, upToAño) {
  const r = (loan.tasa || 0) / 100;
  let s = loan.capital;
  const months = mDiff(loan.mesInicio, loan.añoInicio, upToMes, upToAño);
  for (let i = 0; i < months && s > 0; i++) {
    const mMonth = ((loan.mesInicio - 1 + i) % 12) + 1;
    const mYear = loan.añoInicio + Math.floor((loan.mesInicio - 1 + i) / 12);
    const key = monthKey(mMonth, mYear);
    const paid = (loan.pagos || {})[key];
    const interest = R2(s * r);
    const principal = R2(Math.min(s, loan.cuota - interest));
    if (paid) s = R2(Math.max(0, s - principal));
    // if not paid, balance technically still amortizes (or not — keep it simple: only reduce if paid)
  }
  return Math.max(0, s);
}

function loanPaidCount(loan) {
  return Object.keys(loan.pagos || {}).length;
}

// ═══════════════════════════════════════════════════════════════════════════
// FINANCIAL LOGIC
// ═══════════════════════════════════════════════════════════════════════════
function getIngresos(p) {
  return S.entries.filter(e => {
    if (e.tipo !== 'ingreso') return false;
    if (e.mes !== p.mes || e.año !== p.año) return false;
    if (p.q !== 0 && e.q && e.q !== p.q) return false;
    return true;
  });
}

function getGastos(p) {
  return S.entries.filter(e => {
    if (e.tipo !== 'gasto') return false;
    if (e.mes !== p.mes || e.año !== p.año) return false;
    if (p.q !== 0 && e.q && e.q !== p.q) return false;
    return true;
  });
}

function getAllDebts() {
  // Returns all active debt entries
  return S.entries.filter(e =>
    ['prestamo','mensual','anual'].includes(e.tipo) && e.activo !== false
  );
}

function getDebtsDue(p) {
  const key = monthKey(p.mes, p.año);
  const yearKey = String(p.año);
  const debts = [];

  for (const e of S.entries) {
    if (!['prestamo','mensual','anual'].includes(e.tipo)) continue;
    if (e.activo === false) continue;

    let show = false, montoDue = 0, pagado = false;

    if (e.tipo === 'prestamo') {
      const off = mDiff(e.mesInicio, e.añoInicio, p.mes, p.año);
      if (off < 0 || off >= (e.plazo || 999)) continue;
      show = true;
      montoDue = e.cuota;
      const pg = (e.pagos || {})[key];
      pagado = !!(pg && pg.monto >= montoDue * 0.95);
    } else if (e.tipo === 'mensual') {
      show = true;
      montoDue = e.monto;
      const pg = (e.pagos || {})[key];
      pagado = !!(pg && pg.monto >= montoDue * 0.95);
    } else if (e.tipo === 'anual') {
      if (e.mes !== p.mes) continue;
      show = true;
      montoDue = e.monto;
      const pg = (e.pagos || {})[yearKey];
      pagado = !!(pg && pg.monto >= montoDue * 0.95);
    }

    if (!show) continue;
    // Filter by quincena if set
    if (p.q !== 0 && e.q && e.q !== p.q) continue;

    debts.push({ ...e, montoDue, pagado });
  }
  return debts;
}

function getTotals(p) {
  const ingresos = getIngresos(p).reduce((a,e) => a + (e.monto||0), 0);
  const gastos = getGastos(p).reduce((a,e) => a + (e.monto||0), 0);
  const debts = getDebtsDue(p);
  const pendiente = debts.filter(d => !d.pagado).reduce((a,d) => a + d.montoDue, 0);
  const pagado = debts.filter(d => d.pagado).reduce((a,d) => a + d.montoDue, 0);
  const disponible = R2(S.saldo - pendiente);
  return { ingresos: R2(ingresos), gastos: R2(gastos), pendiente: R2(pendiente),
           pagado: R2(pagado), disponible, debts };
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  if (S.screen === 'welcome') {
    document.getElementById('welcome').style.display = '';
    document.getElementById('app').style.display = 'none';
    return;
  }
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('app').style.display = '';

  // Header
  document.getElementById('period-label').textContent = periodLabel(S.period);
  document.getElementById('header-saldo').textContent = fmtShort(S.saldo);

  // Period mode buttons
  document.querySelectorAll('.pm-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.q) === S.period.q);
  });

  // Tab panels
  ['inicio','balance','deudas','gastos','ia'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === S.tab ? '' : 'none';
  });

  // Nav active state
  document.querySelectorAll('.bnav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === S.tab);
  });

  // Render current tab
  switch(S.tab) {
    case 'inicio':  renderInicio(); break;
    case 'balance': renderBalance(); break;
    case 'deudas':  renderDeudas(); break;
    case 'gastos':  renderGastos(); break;
    case 'ia':      renderIA(); break;
  }
}

// ── INICIO TAB ────────────────────────────────────────────────────────────
function renderInicio() {
  const p = S.period;
  const { ingresos, gastos, pendiente, pagado, disponible, debts } = getTotals(p);
  const pendientes = debts.filter(d => !d.pagado);
  const pagadas = debts.filter(d => d.pagado);
  const recents = [...getIngresos(p), ...getGastos(p)]
    .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''))
    .slice(0, 5);

  const aiCard = (S.claudeKey || S.groqKey) && S.aiInsight
    ? `<div class="ai-insight">
        <div class="ai-insight-hd">✦ IA · Análisis del período</div>
        <div class="ai-insight-txt">${esc(S.aiInsight)}</div>
       </div>`
    : '';

  document.getElementById('tab-inicio').innerHTML = `
    <!-- Balance hero -->
    <div class="balance-hero">
      <div class="hero-lbl">Saldo disponible</div>
      <div class="hero-amount">${fmt(S.saldo)}</div>
      <div class="hero-after ${disponible < 0 ? 'neg' : ''}">
        Después de deudas pendientes: <span>${fmt(disponible)}</span>
      </div>
      <button class="hero-edit" onclick="openSaldoModal()">Editar ✎</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card" style="--c:var(--teal)" onclick="switchTab('balance')">
        <div class="stat-lbl">Ingresos</div>
        <div class="stat-val">${fmtShort(ingresos)}</div>
        <div class="stat-sub">${periodLabel(p)}</div>
      </div>
      <div class="stat-card" style="--c:var(--red)" onclick="switchTab('gastos')">
        <div class="stat-lbl">Gastos</div>
        <div class="stat-val">${fmtShort(gastos)}</div>
        <div class="stat-sub">${periodLabel(p)}</div>
      </div>
      <div class="stat-card" style="--c:var(--amber)" onclick="switchTab('deudas')">
        <div class="stat-lbl">Deudas pend.</div>
        <div class="stat-val">${fmtShort(pendiente)}</div>
        <div class="stat-sub">${pendientes.length} por pagar</div>
      </div>
      <div class="stat-card" style="--c:var(--blue)">
        <div class="stat-lbl">Disponible real</div>
        <div class="stat-val" style="color:${disponible >= 0 ? 'var(--teal)' : 'var(--red)'}">${fmtShort(disponible)}</div>
        <div class="stat-sub">Sin compromisos</div>
      </div>

// ── DEUDAS TAB ────────────────────────────────────────────────────────────
function renderDeudas() {
  const p = S.period;
  const allDebts = getAllDebts();
  const filter = S.deudasFilter || 'todas';

  let filtered = allDebts;
  if (filter === 'prestamos') filtered = allDebts.filter(d => d.tipo === 'prestamo');
  else if (filter === 'mensual') filtered = allDebts.filter(d => d.tipo === 'mensual');
  else if (filter === 'anual') filtered = allDebts.filter(d => d.tipo === 'anual');

  // Enrich with payment status
  const enriched = filtered.map(e => {
    const key = monthKey(p.mes, p.año);
    const yearKey = String(p.año);
    let montoDue = e.monto, pagado = false;
    if (e.tipo === 'prestamo') {
      montoDue = e.cuota;
      const pg = (e.pagos || {})[key];
      pagado = !!(pg && pg.monto >= montoDue * 0.95);
    } else if (e.tipo === 'mensual') {
      const pg = (e.pagos || {})[key];
      pagado = !!(pg && pg.monto >= e.monto * 0.95);
    } else if (e.tipo === 'anual') {
      const pg = (e.pagos || {})[yearKey];
      pagado = !!(pg && pg.monto >= e.monto * 0.95);
    }
    return { ...e, montoDue, pagado };
  });

  const totalMensual = getAllDebts().filter(d => d.tipo !== 'anual')
    .reduce((a,d) => a + (d.cuota || d.monto), 0);

  document.getElementById('tab-deudas').innerHTML = `
    <!-- Summary card -->
    <div class="card card-p" style="margin-bottom:14px;background:linear-gradient(135deg,var(--card),#1a1030)">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
        <div>
          <div class="stat-lbl">Compromisos</div>
          <div style="font-family:var(--mono);font-size:1.2rem;color:var(--amber)">${allDebts.length}</div>
        </div>
        <div>
          <div class="stat-lbl">Mensual total</div>
          <div style="font-family:var(--mono);font-size:1.2rem;color:var(--red)">${fmtShort(totalMensual)}</div>
        </div>
        <div>
          <div class="stat-lbl">Pendiente hoy</div>
          <div style="font-family:var(--mono);font-size:1.2rem;color:var(--red)">
            ${fmtShort(enriched.filter(d=>!d.pagado).reduce((a,d)=>a+d.montoDue,0))}
          </div>
        </div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      ${[['todas','Todas'],['prestamos','Préstamos'],['mensual','Mensuales'],['anual','Anuales']]
        .map(([v,l]) => `<button class="ftab ${filter===v?'on':''}" onclick="setDeudasFilter('${v}')">${l}</button>`)
        .join('')}
    </div>

    <!-- Debt list -->
    ${enriched.length > 0
      ? enriched.sort((a,b) => a.pagado-b.pagado).map(d => debtItemHTML(d, p, false)).join('')
      : `<div class="empty">
          <div class="empty-icon">💳</div>
          <div class="empty-title">Sin deudas registradas</div>
          <div class="empty-sub">Toca + para agregar tu primera deuda o préstamo</div>
         </div>`
    }
  `;
}

// ── SHARED HTML BUILDERS ──────────────────────────────────────────────────
function debtItemHTML(d, p, compact) {
  const icon = d.tipo === 'prestamo' ? '🏦' : d.tipo === 'anual' ? '📅' : '🔄';
  const cls = d.pagado ? 'paid' : d.tipo === 'prestamo' ? 'loan' : d.tipo === 'anual' ? 'annual' : 'pending';
  const pill = d.tipo === 'prestamo'
    ? `<span class="pill pill-amber">Préstamo</span>`
    : d.tipo === 'anual'
    ? `<span class="pill pill-purple">Anual</span>`
    : `<span class="pill pill-blue">Mensual</span>`;
  const statusPill = d.pagado
    ? `<span class="pill pill-teal">✓ Pagado</span>`
    : `<span class="pill pill-red">Pendiente</span>`;

  let extraInfo = '';
  if (d.tipo === 'prestamo' && !compact) {
    const paid = loanPaidCount(d);
    const pct = d.plazo > 0 ? Math.round((paid/d.plazo)*100) : 0;
    const remaining = loanRemainingBalance(d, p.mes, p.año);
    extraInfo = `
      <div class="di-prog">
        <div class="prog"><div class="prog-fill" style="width:${pct}%;background:var(--amber)"></div></div>
        <div class="prog-meta"><span>${paid}/${d.plazo} pagos</span><span>Saldo: ${fmtShort(remaining)}</span></div>
      </div>`;
  }

  const foot = `
    <div class="di-foot">
      ${pill} ${statusPill}
      <div style="flex:1"></div>
      ${!d.pagado
        ? `<button class="btn-pay" onclick="openPagoModal('${d.id}')">Pagar</button>`
        : `<button class="btn-unpay" onclick="unpayDebt('${d.id}')">Desmarcar</button>`
      }
      ${!compact ? `<button class="btn-icon" onclick="deleteEntry('${d.id}')" title="Eliminar">🗑</button>` : ''}
    </div>`;

  return `
    <div class="di ${cls}" id="di-${esc(d.id)}">
      <div class="di-main">
        <div class="di-icon">${icon}</div>
        <div class="di-body">
          <span class="di-name ${d.pagado ? 'crossed' : ''}">${esc(d.nombre)}</span>
          <div class="di-meta">
            ${d.categoria ? `<span>${esc(d.categoria)}</span>` : ''}
            ${d.tipo === 'prestamo' ? `<span>·</span><span>${d.tasa}% mensual</span>` : ''}
            ${d.q ? `<span>·</span><span>Q${d.q}</span>` : ''}
          </div>
        </div>
        <div class="di-right">
          <span class="di-amt" style="color:${d.pagado?'var(--t2)':'var(--red)'}">${fmt(d.montoDue)}</span>
        </div>
      </div>
      ${extraInfo}
      ${foot}
    </div>`;
}

function txItemHTML(e, showDel) {
  const isIngreso = e.tipo === 'ingreso';
  const icon = TIPO_ICONS[(e.categoria||'').toLowerCase()] || (isIngreso ? '💵' : '💸');
  const bg = isIngreso ? 'var(--teal-d)' : 'var(--red-d)';
  const color = isIngreso ? 'var(--teal)' : 'var(--red)';
  const sign = isIngreso ? '+' : '-';
  const qLabel = e.q ? ` · Q${e.q}` : '';

  return `
    <div class="tx-item">
      <div class="tx-dot" style="background:${bg}">${icon}</div>
      <div class="tx-body">
        <span class="tx-name">${esc(e.nombre || e.categoria || 'Transacción')}</span>
        <span class="tx-date">${esc(e.fecha||'')}${qLabel}${e.nota ? ' · ' + esc(e.nota) : ''}</span>
      </div>
      <span class="tx-amt" style="color:${color}">${sign}${fmt(e.monto)}</span>
      ${showDel ? `<button class="tx-del" onclick="deleteEntry('${e.id}')" title="Eliminar">✕</button>` : ''}
    </div>`;
}

function calcLoanPreview() {
  const cap = parseFloat(document.getElementById('dl-capital')?.value);
  const tasa = parseFloat(document.getElementById('dl-tasa')?.value);
  const plazo = parseInt(document.getElementById('dl-plazo')?.value);
  if (!cap || !tasa || !plazo) { document.getElementById('loan-preview').style.display='none'; return; }
  const cuota = calcCuota(cap, tasa, plazo);
  const total = R2(cuota * plazo);
  const int = R2(total - cap);
  document.getElementById('loan-preview').style.display = '';
  document.getElementById('lp-cuota').textContent = fmt(cuota);
  document.getElementById('lp-total').textContent = fmt(total);
  document.getElementById('lp-int').textContent = fmt(int);
  if (document.getElementById('dl-cuota')) document.getElementById('dl-cuota').placeholder = fmt(cuota);
}

  const tasa = parseFloat(document.getElementById('dl-tasa')?.value) || 0;

  const cuotaManual = parseFloat(document.getElementById('dl-cuota')?.value);

  const e = S.entries.find(x => x.id === id);
  if (!e) return;

  const key = e.tipo === 'anual' ? String(p.año) : monthKey(p.mes, p.año);
  const monto = parseFloat(document.getElementById('pago-monto')?.value);

  e.pagos[key] = { monto: R2(monto), fecha, nota };
  if (descSaldo) S.saldo = R2(Math.max(0, S.saldo - monto));

  persist(); closeModal(); render();

}

      <input class="field" type="password" id="cfg-claude-key" placeholder="sk-ant-..." value="${S.claudeKey ? '••••••••••••••' : ''}">
      <button class="btn btn-ghost btn-sm btn-full" style="margin-top:6px" onclick="saveApiKey('claude')">Guardar clave Claude</button>
    </div>
    ` : `
    <div class="settings-item">
      <div>
        <div class="si-lbl">Groq API Key</div>
        <div class="si-sub">
          <a href="https://console.groq.com" target="_blank" style="color:var(--blue)">Gratis en console.groq.com →</a><br>
          Se guarda solo en tu dispositivo
        </div>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <input class="field" type="password" id="cfg-groq-key" placeholder="gsk_..." value="${S.groqKey ? '••••••••••••••' : ''}">
      <button class="btn btn-ghost btn-sm btn-full" style="margin-top:6px" onclick="saveApiKey('groq')">Guardar clave Groq</button>
    </div>
    `}

    <hr class="divider">

    <div class="settings-item">
      <div>
        <div class="si-lbl">Datos</div>
        <div class="si-sub">${S.entries.length} entradas · Saldo: ${fmt(S.saldo)}</div>
      </div>
      <div class="si-right" style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="exportData()">Exportar</button>
        <button class="btn btn-danger btn-sm" onclick="clearData()">Borrar todo</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:16px;font-size:.72rem;color:var(--t2)">
      FinanzasQ v4 · Todos los datos se almacenan localmente en tu dispositivo
    </div>
  `);
}

function saveName() {
  const v = document.getElementById('cfg-name')?.value?.trim();
  if (!v) return;
  S.name = v; persist(); toast('Nombre guardado ✓');
}

function saveApiKey(provider) {
  const inp = document.getElementById(`cfg-${provider}-key`);
  const v = (inp?.value||'').trim();
  if (!v || v.includes('•')) { toast('Ingresa una clave válida', true); return; }
  if (provider === 'claude') { S.claudeKey = v; S.aiProvider = 'claude'; }
  else { S.groqKey = v; S.aiProvider = 'groq'; }
  persist(); closeModal(); render();
  toast(`API Key ${provider} guardada ✓`);
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `finanzasq-backup-${isoToday()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearData() {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  localStorage.removeItem(LS);
  location.reload();
}

// ═══════════════════════════════════════════════════════════════════════════
// AI INTEGRATION
// ═══════════════════════════════════════════════════════════════════════════
function buildFinancialContext() {
  const p = S.period;
  const { ingresos, gastos, pendiente, pagado, disponible, debts } = getTotals(p);
  const allDebts = getAllDebts();
  const totalMensual = allDebts.filter(d=>d.tipo!=='anual').reduce((a,d)=>a+(d.cuota||d.monto),0);

  const ingresosList = getIngresos(p).map(e => `  - ${e.nombre}: ${fmt(e.monto)} (Q${e.q||'?'})`).join('\n') || '  Ninguno registrado';
  const gastosList = getGastos(p).map(e => `  - ${e.nombre}: ${fmt(e.monto)} (${e.categoria})`).join('\n') || '  Ninguno registrado';
  const pendientesStr = debts.filter(d=>!d.pagado).map(d => `  - ${d.nombre} [${d.tipo}]: ${fmt(d.montoDue)}`).join('\n') || '  Ninguno pendiente';
  const pagadasStr = debts.filter(d=>d.pagado).map(d => `  - ✓ ${d.nombre}: ${fmt(d.montoDue)}`).join('\n') || '  Ninguno pagado aún';

  const ratioDeuda = ingresos > 0 ? Math.round((pendiente/ingresos)*100) : 0;

  return `DATOS FINANCIEROS DE ${S.name.toUpperCase()} — ${periodLabel(p).toUpperCase()}

💰 SALDO ACTUAL: ${fmt(S.saldo)}
📊 DISPONIBLE (después de deudas pendientes): ${fmt(disponible)}

📅 PERÍODO: ${periodLabel(p)}

💵 INGRESOS DEL PERÍODO: ${fmt(ingresos)}
${ingresosList}

💸 GASTOS DEL PERÍODO: ${fmt(gastos)}
${gastosList}

🔴 DEUDAS PENDIENTES: ${fmt(pendiente)} (${debts.filter(d=>!d.pagado).length} compromisos)
${pendientesStr}

✅ DEUDAS PAGADAS ESTE PERÍODO:
${pagadasStr}

📊 RESUMEN FINANCIERO:
  - Compromiso mensual total: ${fmt(totalMensual)}
  - Ratio deuda/ingreso: ${ratioDeuda}%
  - Préstamos activos: ${allDebts.filter(d=>d.tipo==='prestamo').length}
  - Deudas mensuales: ${allDebts.filter(d=>d.tipo==='mensual').length}
  - Pagos anuales: ${allDebts.filter(d=>d.tipo==='anual').length}
  - Total compromisos activos: ${allDebts.length}`;
}

function buildSystemPrompt() {
  return `Eres FinBot, el asesor financiero personal e inteligente de ${S.name}. 
Tienes acceso completo a sus datos financieros en tiempo real.

${buildFinancialContext()}

INSTRUCCIONES:
- Responde SIEMPRE en español, de forma directa y práctica
- Usa los datos reales en tus respuestas; sé específico con los montos
- Da consejos accionables y concretos, no genéricos
- Si hay deudas urgentes, menciónalas explícitamente
- Si el ratio deuda/ingreso es alto (>50%), advierte amablemente
- Sé conciso (máx 180 palabras) a menos que se pida más detalle
- Usa emojis con moderación para hacer las respuestas amigables
- Formatea listas con guiones o números cuando sea necesario
- Nunca inventes datos; solo usa los proporcionados arriba`;
}

async function sendAI(prompt) {
  document.getElementById('ai-input') && (document.getElementById('ai-input').value = prompt);
  submitAI(prompt);
}

async function submitAI(forcePrompt) {
  const inp = document.getElementById('ai-input');
  const msg = forcePrompt || (inp?.value?.trim());
  if (!msg) return;
  if (inp) inp.value = '';

  if (!S.claudeKey && !S.groqKey) {
    toast('Configura una API Key en ⚙️ Configuración', true); return;
  }
  if (S.aiLoading) return;

  S.aiMessages.push({ role: 'user', content: msg });
  S.aiLoading = true;
  renderIA();

  try {
    let reply = '';

    if (S.aiProvider === 'claude' && S.claudeKey) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': S.claudeKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 800,
          system: buildSystemPrompt(),
          messages: S.aiMessages.slice(-12)
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      reply = data.content?.[0]?.text || 'Sin respuesta';
    } else if (S.groqKey) {
      const msgs = [{ role: 'system', content: buildSystemPrompt() }, ...S.aiMessages.slice(-12)];
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${S.groqKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: GROQ_MODEL, max_tokens: 800, temperature: 0.65, messages: msgs })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      reply = data.choices?.[0]?.message?.content || 'Sin respuesta';
    }

    S.aiMessages.push({ role: 'assistant', content: reply });
    // Save last insight for dashboard
    if (S.aiMessages.length <= 3) S.aiInsight = reply.slice(0, 200);

  } catch(err) {
    S.aiMessages.push({ role: 'assistant', content: `⚠️ Error: ${err.message || 'No se pudo conectar'}. Verifica tu API Key en ⚙️ Configuración.` });
  }

  S.aiLoading = false;
  persist();
  renderIA();
}

// ═══════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════════════
let _toastTimer;
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = err ? 'var(--red)' : 'var(--teal)';
  el.style.color = err ? '#fff' : '#040d1a';
  el.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.style.display = 'none', 2800);
}

function switchTab(tab) {
  S.tab = tab;
  render();
  // Scroll tab content to top
  const panel = document.getElementById('tab-' + tab);
  if (panel) panel.scrollTop = 0;
}

function setQ(q) {
  S.period.q = parseInt(q);
  persist(); render();
}

function prevPeriod() {
  let { mes, año } = S.period;
  mes--; if (mes < 1) { mes = 12; año--; }
  S.period = { ...S.period, mes, año };
  persist(); render();
}

function nextPeriod() {
  let { mes, año } = S.period;
  mes++; if (mes > 12) { mes = 1; año++; }
  S.period = { ...S.period, mes, año };
  persist(); render();
}

function setDeudasFilter(f) {
  S.deudasFilter = f; render();
}

function selectSeg(btn, group) {
  // Find parent seg and toggle
  const seg = btn.closest('.seg');
  if (!seg) return;
  seg.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function onboard() {
  const name = document.getElementById('w-name')?.value?.trim();
  const saldo = parseFloat(document.getElementById('w-saldo')?.value) || 0;
  if (!name) { document.getElementById('w-name').focus(); return; }
  S.name = name;
  S.saldo = R2(saldo);
  S.screen = 'app';
  S.period = { mes: NOW.getMonth() + 1, año: NOW.getFullYear(), q: 0 };
  persist(); render();
}
